name: nova_aden
description: "Aplicación multiplataforma para la gestión operativa de MIPYMES y TCP (nova-ADEN)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # --- Persistencia Offline (SQLite) ---
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # --- Gestión de Estado ---
  provider: ^6.1.2

  # --- Utilidades ---
  intl: ^0.19.0
  uuid: ^4.4.2

  # --- Reportes y Exportación ---
  pdf: ^3.11.1
  printing: ^5.13.3
  csv: ^6.0.0

  # --- Gráficos (Dashboard) ---
  fl_chart: ^0.69.0

  # --- UI ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
