name: Build nova-ADEN (Android Universal)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip

      - name: Get dependencies
        working-directory: ./nova_aden
        run: flutter pub get

      - name: Analyze project
        working-directory: ./nova_aden
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # CORRECCIÓN: 
      # --split-per-abi SE ELIMINÓ para generar UN SOLO APK UNIVERSAL.
      # Esto incluye todas las arquitecturas (arm64, armeabi-v7a, x86) en un solo archivo.
      - name: Build Universal APK
        working-directory: ./nova_aden
        run: flutter build apk --release

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-universal-apk
          path: nova_aden/build/app/outputs/flutter-apk/*.apk
